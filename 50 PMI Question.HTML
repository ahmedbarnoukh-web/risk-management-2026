
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إختبار كورس إدارة المخاطر الاحترافية | BA Academy</title>
    <style>
        :root {
            --primary: #10b981;
            --bg-dark: #111827;
            --card-bg: #1f2937;
            --text-main: #f3f4f6;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .quiz-container {
            background-color: var(--card-bg);
            border: 1px solid #374151;
            border-radius: 12px;
            padding: 30px;
            width: 100%;
            max-width: 750px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            text-align: center;
        }

        h1 { color: var(--primary); font-size: 24px; margin-bottom: 10px; }
        p.subtitle { color: #9ca3af; font-size: 14px; margin-top: 0; margin-bottom: 25px; }

        .start-screen input {
            background-color: #374151;
            border: 1px solid #4b5563;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            width: 80%;
            margin-bottom: 20px;
            text-align: center;
        }
        .start-screen input:focus { border-color: var(--primary); }

        .progress-container {
            width: 100%;
            background-color: #374151;
            border-radius: 10px;
            height: 8px;
            margin-bottom: 25px;
            overflow: hidden;
            display: none;
        }
        .progress-bar {
            height: 100%;
            background-color: var(--primary);
            width: 0%;
            transition: width 0.3s ease;
        }

        .question-box { display: none; text-align: right; }
        .question-text { font-size: 18px; font-weight: 600; margin-bottom: 20px; line-height: 1.6; }
        
        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }
        .option-btn {
            background-color: #374151;
            border: 1px solid #4b5563;
            color: var(--text-main);
            padding: 14px 20px;
            border-radius: 8px;
            cursor: pointer;
            text-align: right;
            font-size: 15px;
            transition: all 0.2s;
            line-height: 1.4;
        }
        .option-btn:hover { background-color: #4b5563; border-color: #9ca3af; }
        .option-btn.selected { background-color: #047857; border-color: var(--primary); }

        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
            transition: background 0.2s;
        }
        .btn:hover { background-color: #059669; }
        .btn:disabled { background-color: #4b5563; cursor: not-allowed; box-shadow: none; }

        .screen { display: none; }
        
        .success-box {
            color: #10b981;
            font-size: 22px;
            font-weight: bold;
            line-height: 1.6;
            margin: 20px 0;
        }
        .fail-box {
            color: #ef4444;
            font-size: 20px;
            font-weight: bold;
            line-height: 1.6;
            margin: 20px 0;
        }
    </style>
</head>
<body>

    <div class="quiz-container">
        <h1>BA Academy</h1>
        <p class="subtitle">إختبار تقييم دورة إدارة المخاطر الاحترافية (PMI-RMP)</p>

        <div class="progress-container" id="progress-area">
            <div class="progress-bar" id="progress-bar"></div>
        </div>

        <div id="start-screen" class="start-screen">
            <p style="font-size: 16px; margin-bottom: 20px;">أهلاً بك يا هندسة في الاختبار النهائي للدورة. يرجى كتابة اسمك الثلاثي لبدء الاختبار (50 سؤالاً):</p>
            <input type="text" id="trainee-name" placeholder="اكتب اسمك بالكامل هنا..." required>
            <br>
            <button class="btn" onclick="startQuiz()">بدء الاختبار الآن</button>
        </div>

        <div id="quiz-screen" class="question-box">
            <div class="question-text" id="question-text">جاري تحميل السؤال...</div>
            <div class="options-list" id="options-list"></div>
            <button class="btn" id="next-btn" onclick="nextQuestion()" disabled>السؤال التالي</button>
        </div>

        <div id="result-screen" class="screen">
            <div id="result-content"></div>
        </div>
    </div>

    <script>
        const SERVER_URL = "https://script.google.com/macros/s/AKfycbyfx9qaiPzgWqfHXOdFV1TsNzeK-fEt0Lu2K1EUH3Npftweay3adOhi-9nOsSN4NvOR/exec";
        
        // مصفوفة الـ 50 سؤالاً المعتمدة مع إضافة رموز الخيارات (أ، ب، ج، د)
        const questions = [
            { q: "1. ما هو الهدف الرئيسي من عملية تخطيط إدارة المخاطر في المشروع؟", options: ["أ) تحديد جميع المخاطر المحتملة بشكل نهائي", "ب) وضع الميزانية التفصيلية لكل خطر محتمل", "ج) تحديد كيفية إجراء وخطوات أنشطة إدارة المخاطر للمشروع", "د) تحليل التأثير المالي للمخاطر الكمية الكبرى"], correct: 2 },
            { q: "2. المسؤول الأول والنهائي عن نجاح إدارة المخاطر الشاملة داخل المشروع هو:", options: ["أ) مدير المشروع", "ب) مدير إدارة المخاطر (Risk Manager)", "ج) راعى المشروع (Sponsor)", "د) فريق الجودة"], correct: 0 },
            { q: "3. ما المقصود بمصطلح 'شهية المخاطر' (Risk Appetite) للمنظمة؟", options: ["أ) الحد الأقصى من الخسائر المادية التي يمكن تحملها دون إفلاس", "ب) درجة عدم اليقين التي تكون المنظمة على استعداد لقبولها في سبيل تحقيق عوائد", "ج) الجدول الزمن المخصص لإنهاء أنشطة الطوارئ والاستجابة", "د) مؤشر رقمي ثابت يمنع مديري المشاريع من اتخاذ قرارات جريئة"], correct: 1 },
            { q: "4. أي مما يلي يمثل بدقة تعريف 'عتبة المخاطر' (Risk Threshold)؟", options: ["أ) المستوى المحدد من المخاطر الذي يوجب التدخل الفوري أو التصعيد", "ب) مجموع الميزانيات الاحتياطية المتوفرة لدى إدارة الشركة", "ج) أول خطر تم رصده وتوثيقه في سجل مخاطر المشروع", "د) النسبة المئوية المخصصة للمشتريات الخارجية فقط"], correct: 0 },
            { q: "5. متى يجب البدء الفعلي في عملية التخطيط لإدارة مخاطر المشروع؟", options: ["أ) بعد إنهاء خطة المشروع بالكامل والموافقة عليها", "ب) عند حدوث أول مشكلة فنية تؤثر على الجدول الزمني", "ج) في أقرب وقت ممكن عند بدء أو صياغة ميثاق المشروع", "د) أثناء مرحلة تسليم المشروع والتأكد من الجودة"], correct: 2 },
            { q: "6. الأداة الهيكلية التي تستخدم لتصنيف المخاطر وتنظيمها حسب المصدر تسمى:", options: ["أ) هيكل تجزئة العمل (WBS)", "ب) هيكل تجزئة المخاطر (RBS)", "ج) مصفوفة تتبع المتطلبات (RTM)", "د) مخطط الإعصار التراكمي"], correct: 1 },
            { q: "7. أي وثيقة تحتوي على المنهجية والأدوار والمسؤوليات والميزانية الخاصة بالتعامل مع المخاطر عموماً؟", options: ["أ) خطة إدارة المخاطر (Risk Management Plan)", "ب) سجل المخاطر (Risk Register)", "ج) بيان نطاق العمل (Scope Statement)", "د) خطة إدارة الجودة"], correct: 0 },
            { q: "8. ما هي الفائدة الأساسية من إشراك أصحاب المصلحة (Stakeholders) في مرحلة التخطيط للمخاطر؟", options: ["أ) نقل مسؤولية إدارة المخاطر بالكامل إليهم قانونياً", "ب) تقليل تكلفة الميزانية الإجمالية للمشروع بنسبة ثابتة", "ج) ضمان توافق توقعاتهم وفهم مستويات تحملهم للمخاطر بدقة", "د) إجبارهم على عدم المطالبة بتغييرات في النطاق لاحقاً"], correct: 2 },
            { q: "9. في أي البيئات تكون إدارة المخاطر أكثر أهمية وإلحاحاً؟", options: ["أ) المشاريع النمطية المتكررة ذات الميزانيات الصغيرة", "ب) المشاريع ذات التعقيد العالي ونسب عدم اليقين المرتفعة", "ج) المشاريع الحكومية التقليدية قصيرة المدى", "د) المشاريع التي لا تعتمد على موردين خارجيين"], correct: 1 },
            { q: "10. ما هو التعريف القياسي للخطر (Risk) وفقاً لدليل معهد إدارة المشاريع (PMI)؟", options: ["أ) حدث غير مؤكد، إذا وقع، له تأثير إيجابي أو سلبي على هدف أو أكثر من أهداف المشروع", "ب) حدث سلبي كارثي يؤدي دائماً لفشل المشروع وخسارة رأس المال", "ج) تغيير غير مصرح به في نطاق العمل يتسبب في تأخير الجداول الزمنية", "د) أي خطأ بشري يرتكبه أحد أعضاء فريق العمل أثناء التنفيذ"], correct: 0 },
            { q: "11. أي من الأدوات التالية تستخدم لجمع آراء الخبراء حول المخاطر دون الكشف عن هوياتهم لتجنب الانحياز؟", options: ["أ) المقابلات الشخصية المباشرة (Interviews)", "ب) جلسات العصف الذهني المفتوحة (Brainstorming)", "ج) تقنية دلفي (Delphi Technique)", "د) تحليل سوات الرباعي (SWOT)"], correct: 2 },
            { q: "12. الوثيقة الحية التي تولد في مرحلة 'تحديد المخاطر' ويتم تحديثها باستمرار طوال المشروع هي:", options: ["أ) سجل المخاطر (Risk Register)", "ب) التقرير المالي السنوي", "ج) خطة إدارة التغيير", "د) قاموس هيكل تجزئة العمل"], correct: 0 },
            { q: "13. ما هي الوظيفة الأساسية لجلسات العصف الذهني (Brainstorming) في تحديد المخاطر؟", options: ["أ) اتخاذ قرارات نهائية بشأن ميزانية الاحتياطي", "ب) جمع أكبر عدد ممكن من المخاطر المحتملة عبر تفاعل الفريق", "ج) تحديد المسؤول عن تنفيذ الاستجابة لكل خطر", "د) حساب الاحتمالات الرقمية الدقيقة لحدوث المخاطر"], correct: 1 },
            { q: "14. تحليل SWOT يعتمد على دراسة أربعة محاور أساسية للمشروع وهي:", options: ["أ) السرعة، التكلفة، الجودة، النطاق", "ب) الموردين، العملاء، المنافسين، القوانين", "ج) نقاط القوة، نقاط الضعف، الفرص، التهديدات", "د) الخطط البديلة، الحلول المباشرة، الطوارئ، الأزمات"], correct: 2 },
            { q: "15. في عالم إدارة المخاطر، ماذا يعادل مصطلح 'الخطر الإيجابي' (Positive Risk)؟", options: ["أ) التهديد المقبول (Accepted Threat)", "ب) الفرصة (Opportunity)", "ج) الاحتياطي الإداري الفائض", "د) الميزة التنافسية المؤكدة"], correct: 1 },
            { q: "16. أي مما يلي ليس من مخرجات عملية تحديد المخاطر (Identify Risks)؟", options: ["أ) قائمة بالمخاطر المحددة", "ب) قائمة بالاستجابات المحتملة الأولية", "ج) خطة الاستجابة المعتمدة والممولة للمخاطر", "د) ملاك المخاطر المحتملين (Potential Owners)"], correct: 2 },
            { q: "17. الاعتماد على قوائم الفحص والمراجعة (Checklist Analysis) في تحديد المخاطر يعتمد بشكل أساسي على:", options: ["أ) المعلومات والدروس المستفادة من مشاريع سابقة مماثلة", "ب) التوقعات الرياضية المستندة على الذكاء الاصطناعي", "ج) رغبات وأهواء راعي المشروع الشخصية", "د) القوانين والتشريعات المحلية الحديثة فقط"], correct: 0 },
            { q: "18. استخدام مخطط السبب والأثر (عظمة السمكة / إيشيكاوا) في المخاطر يهدف إلى:", options: ["أ) حساب الوقت المستغرق لتنفيذ الاستجابة طردياً", "ب) تحديد الأسباب الجذرية الكامنة وراء المخاطر المحتملة", "ج) عرض العلاقة المالية بين الموردين والمقاولين", "د) ترتيب المخاطر ترتيباً تنازلياً حسب التكلفة"], correct: 1 },
            { q: "19. كم مرة يجب على فريق عمل المشروع القيام بعملية تحديد المخاطر؟", options: ["أ) مرة واحدة فقط في بداية المشروع", "ب) عند نهاية كل مرحلة محاسبية فقط", "ج) بشكل دوري ومستمر طوال دورة حياة المشروع", "د) فقط عندما يطلب العميل أو الاستشاري ذلك"], correct: 2 },
            { q: "20. ما المقصود بالمخاطر من نوع 'المعروف-المجهول' (Known-Unknowns)؟", options: ["أ) مخاطر تم تحديدها ومعرفتها ولكن حجم تأثيرها أو احتمالها غير مؤكد بدقة", "ب) مخاطر غامضة تماماً لا يمكن التنبؤ بها وتحدث فجأة", "ج) أخطاء برمجية معروفة تم حلها سابقاً في خطة الجودة", "د) الفرص الإيجابية المضمونة بنسبة مئة بالمئة"], correct: 0 },
            { q: "21. ينصب التركيز الأساسي لعملية التحليل الكيفي للمخاطر (Qualitative Risk Analysis) على:", options: ["أ) حساب الأرقام المالية الدقيقة لتأثير المخاطر على التدفق النقدي", "ب) تقييم احتمالية حدوث المخاطر وتأثيرها لترتيب أولوياتها", "ج) شراء بوالص التأمين المناسبة ضد الكوارث الطبيعية", "د) تعديل الجدول الزمني التفصيلي للمشروع عبر المسار الحرج"], correct: 1 },
            { q: "22. الأداة الأكثر شيوعاً واستخداماً لتصنيف وترتيب المخاطر كيفياً بناءً على درجتها هي:", options: ["أ) مخطط الإعصار الحركي", "ب) منحنى التوزيع الطبيعي (S-Curve)", "ج) مصفوفة الاحتمالية والأثر (Probability and Impact Matrix)", "د) شجرة القرارات الاستثمارية"], correct: 2 },
            { q: "23. المخاطر ذات الأولوية المنخفضة جداً يتم وضعها في سجل المخاطر داخل:", options: ["أ) قائمة المراقبة (Watchlist)", "ب) خطة الطوارئ الفورية", "ج) الملحق المالي السري للمشروع", "د) قائمة التصعيد لمجلس الإدارة"], correct: 0 },
            { q: "24. ماذا يعني تقييم جودة بيانات المخاطر (Risk Data Quality Assessment)؟", options: ["أ) حساب عدد الكلمات المستخدمة في وصف الخطر", "ب) شراء برامج حاسوبية باهظة لتخزين البيانات وبيان جودتها", "ج) التأكد من أن البيانات والمعلومات المستخدمة في تحليل الخطر دقيقة وموثوقة", "د) التأكد من أن جميع أعضاء الفريق يتقنون اللغة الإنجليزية"], correct: 2 },
            { q: "25. التحليل الكيفي للمخاطر يتميز بأنه مقارنة بالتحليل الكمي:", options: ["أ) أكثر استهلاكاً للوقت والتكلفة ويتطلب معادلات معقدة", "ب) سريع، قليل التكلفة نسيباً، وإلزامي لجميع المخاطر المحددة", "ج) يعتمد فقط على الآلات والحواسب العملاقة دون تدخل بشري", "د) لا يغير من ترتيب أولويات سجل المخاطر مطلقاً"], correct: 1 },
            { q: "26. ما الذي يحدد بدقة 'أثر الخطر' (Risk Impact)؟", options: ["أ) مدى تأثير الخطر على أهداف المشروع مثل الوقت والتكلفة والجودة حال حدوثه", "ب) المدة الزمنية الفاصلة بين رصد الخطر وبدء نشاطه", "ج) عدد أفراد الفريق المتأثرين نفسياً بالخطر", "د) التكلفة المادية لشراء معدات الوقاية الشخصية"], correct: 0 },
            { q: "27. أي من العوامل التالية يقيس مدى سرعة استجابة المنظمة المطلوبة للخطر؟", options: ["أ) الاحتمالية الفلكية", "ب) الاستعجال / الإلحاح (Urgency)", "ج) العمق الجغرافي للخطر", "د) الصلابة الهيكلية للمؤسسة"], correct: 1 },
            { q: "28. تصنيف المخاطر (Risk Categorization) يساعد إدارة المشروع في:", options: ["أ) توزيع المكافآت المالية على الموظفين المتميزين", "ب) تحديد حزم العمل أو مجالات المشروع الأكثر عرضة للمخاطر لمعالجتها جماعياً", "ج) إلغاء العقود مع الموردين الضعاف فوراً وبدون إنذار", "د) تغيير الهيكل التنظيمي للشركة بالكامل"], correct: 1 },
            { q: "29. من هم الأشخاص الأنسب للمشاركة في تقييم احتمالية وأثر المخاطر كيفياً؟", options: ["أ) المحاسب المالي الخارجي للشركة فقط", "ب) الخبراء المعنيون، أعضاء فريق المشروع، وأصحاب المصلحة المطلعين", "ج) أي شخص خارج المشروع لضمان الحياد التام", "د) موظفو الاستقبال والأمن في الموقع"], correct: 1 },
            { q: "30. المخرج الرئيسي والأساسي بعد إنهاء عملية التحليل الكيفي للمخاطر هو:", options: ["أ) تحديث سجل المخاطر بقائمة المخاطر المرتبة حسب أولويتها", "ب) إلغاء خطة المشروع البديلة بالكامل", "ج) توقيع اتفاقيات نهائية مع شركات التأمين", "د) صرف احتياطي الطوارئ بالكامل"], correct: 0 },
            { q: "31. يهدف التحليل الكمي للمخاطر (Quantitative Risk Analysis) بشكل رئيسي إلى:", options: ["أ) كتابة وصف أدبي ومطول عن المخاطر العامة للمشروع", "ب) تحليل التأثير العددي والمالي الإجمالي للمخاطر على أهداف المشروع ككل", "ج) تحديد من هو الشخص المسؤول عن حدوث الخطأ الفني", "د) تعديل ساعات العمل اليومية للعمال بالموقع"], correct: 1 },
            { q: "32. أي مما يلي يعد من الأدوات الرياضية الشهيرة والمستخدمة في التحليل الكمي للمخاطر؟", options: ["أ) تحليل القيمة المحققة (EVM)", "ب) محاكاة مونت كارلو (Monte Carlo Simulation)", "ج) مخطط عظمة السمكة الكيفي", "د) قوائم الفحص الثابتة"], correct: 1 },
            { q: "33. مخطط الإعصار (Tornado Diagram) يُسْتخْدم بشكل أساسي في أي من العمليات التالية؟", options: ["أ) تحليل الحساسية (Sensitivity Analysis) لمعرفة أكثر المخاطر تأثيراً رقمياً", "ب) تحديد سرعة الرياح وتأثيرها على المشاريع الإنشائية", "ج) حساب الاحتياطي الإداري الخاص بمجلس الإدارة", "د) رسم المسار الحرج للجدول الزمني للأنشطة مجهولة المدة"], correct: 0 },
            { q: "34. شجرة القرارات (Decision Tree Analysis) تستخدم لمساعدة متخذ القرار على:", options: ["أ) تجنب اتخاذ أي قرارات استثمارية خطيرة ومفاجئة", "ب) حساب القيمة المالية المتوقعة (EMV) للمسارات البديلة واختيار الأفضل", "ج) معرفة الهيكل الوظيفي للشركات المنافسة في السوق", "د) تحديد الأنواع النباتية الأنسب لتزيين موقع المشروع"], correct: 1 },
            { q: "35. إذا كان هناك خطر احتمالية حدوثه 20%، وتأثيره المالي حال حدوثه خسارة بقيمة 10,000 دولار، فكم تبلغ القيمة المالية المتوقعة (EMV) له؟", options: ["أ) 2,000 دولار كسب", "ب) خسارة 10,000 دولار", "ج) خسارة 5,000 دولار", "د) خسارة 2,000 دولار"], correct: 3 },
            { q: "36. تشغيل محاكاة مونت كارلو للجدول الزمني للمشروع يزودنا بـ:", options: ["أ) المنحنى الاحتمالي لمعرفة نسبة فرصة إنهاء المشروع في تاريخ محدد", "ب) أسماء الموظفين الذين قد يتغيبون عن العمل مستقبلاً", "ج) قائمة أسعار المواد الخام في البورصة العالمية", "د) مخطط التدفق التدريبي للعمال"], correct: 0 },
            { q: "37. هل عملية التحليل الكمي للمخاطر إلزامية ومطلوبة في كل المشاريع بلا استثناء؟", options: ["أ) نعم، بديل للتحليل الكيفي ولا ينفصل عنه أبداً", "ب) لا، هي عملية اختيارية وتجرى غالباً للمشاريع الكبيرة، المعقدة، أو ذات الأهمية الاستراتيجية", "ج) نعم، وتتم قبل تحديد المخاطر لضمان دقة الأرقام", "د) لا، وتتم فقط عند فشل المشروع تماماً لمعرفة أسباب الخسارة"], correct: 1 },
            { q: "38. ماذا يمثل التوزيع الاحتمالي (مثل توزيع بيتا أو التوزيع المثلثي) في التحليل الكمي؟", options: ["أ) مدى تباين قيم التكلفة أو الوقت ومستويات عدم اليقين للأنشطة", "ب) عدد المخاطر التي تقع في كل ربع سنوي", "ج) النسبة المئوية للأرباح الصافية الموزعة على المساهمين", "د) معدل استهلاك الوقود للمعدات الثقيلة"], correct: 0 },
            { q: "39. أي أداة كمية تقيس مدى تأثير تغير متغير واحد فقط على أهداف المشروع مع تثبيت باقي المتغيرات؟", options: ["أ) تحليل الحساسية (Sensitivity Analysis)", "ب) تحليل السيناريوهات المتعددة المفتوحة", "ج) مصفوفة الصلاحيات والمسؤوليات (RACI)", "د) تحليل النطاق المرن"], correct: 0 },
            { q: "40. من المخرجات الأساسية لعملية التحليل الكمي للمخاطر:", options: ["أ) صياغة خطة إدارة المخاطر لأول مرة", "ب) تحديد المقدار الرقمي الدقيق للاحتياطي المالي والتوقيتي المطلوب للمشروع", "ج) إغلاق سجل المخاطر وحفظه في الأرشيف", "د) شطب التهديدات الضعيفة من سجل المراقبة"], correct: 1 },
            { q: "41. أي مما يلي يعد استراتيجية معتمدة للتعامل مع التهديدات السلبية (Negative Risks)؟", options: ["أ) الاستغلال (Exploit)", "ب) النقل (Transfer) مثل شراء بوليصة تأمين أو التعاقد مع مقاول باطن", "ج) المشاركة (Share)", "د) التعزيز (Enhance)"], correct: 1 },
            { q: "42. استراتيجية 'التجنب' (Avoid) للتعامل مع التهديدات تعني برمجياً وعملياً:", options: ["أ) تجاهل الخطر تماماً والأمل في عدم حدوثه مستقبلاً", "ب) تغيير خطة المشروع أو النطاق للقضاء على الخطر أو حماية أهداف المشروع منه تماماً", "ج) تخصيص الخطر لطرف خارجي يتحمل تكلفته المالية", "د) تقليل احتمالية حدوث الخطر أو تأثيره إلى حد مقبول"], correct: 1 },
            { q: "43. ما هي الاستراتيجية الأنسب عندما تريد المنظمة تخصيص خطر إيجابي (فرصة) لطرف ثالث قادر على اقتناصها بشكل أفضل؟", options: ["أ) المشاركة (Share)", "ب) القبول (Accept)", "ج) التصعيد (Escalate)", "د) التجنب (Avoid)"], correct: 0 },
            { q: "44. ما المقصود بـ 'الخطر المتبقي' (Residual Risk) في إدارة المشاريع؟", options: ["أ) الخطر الأكبر الذي يهدد حياة المشروع بالكامل ويصعب السيطرة عليه", "ب) الخطر الذي يتبقى متوقعاً وقائماً حتى بعد تنفيذ خطط الاستجابة المصممة له", "ج) الخطر الكلي للمشروع قبل البدء في أي عمليات تحليل كيفي أو كمي", "د) الفرص الإيجابية الناشئة من الوفورات المالية للمشروع"], correct: 1 },
            { q: "45. 'الخطر الثانوي' (Secondary Risk) هو الخطر الذي:", options: ["أ) يقع في المرتبة الثانية من حيث الأهمية في مصفوفة الاحتمالية والأثر", "ب) يحدث فقط في النصف الثاني من دورة حياة المشروع الزمنية", "ج) ينشأ كـنتيجة مباشرة ومستحدثة لتنفيذ استجابة معينة لخطر آخر أولى", "د) يتم اكتشافه بواسطة العميل وليس فريق إدارة المشروع"], correct: 2 },
            { q: "46. خطة الطوارئ (Contingency Plan) هي خطة استجابة يتم تصميمها مسبقاً، ولكن لا يتم تفعيلها إلا عند:", options: ["أ) وقوع أحداث محددة تسمى المؤشرات أو المحفزات (Triggers)", "ب) نفاد الاحتياطي الإداري الخاص بالشركة بالكامل", "ج) طلب راعي المشروع إيقاف الأعمال مؤقتاً لتعديل النطاق", "د) استقالة مدير المشروع أو أحد المهندسين الأساسيين"], correct: 0 },
            { q: "47. احتياطي الطوارئ (Contingency Reserve) يقع تحت الصلاحية المباشرة لـ ويستخدم لمواجهة:", options: ["أ) مجلس الإدارة / المخاطر غير المعروفة تماماً", "ب) مدير المشروع / المخاطر المحددة والمعروفة (Known-Unknowns)", "ج) المحاسب المالي للموقع / الأخطاء الحسابية والمشتريات الزائدة", "د) العميل / التغييرات المطلوبة في التصميم الفني"], correct: 1 },
            { q: "48. احتياطي الإدارة (Management Reserve) يُرصد في الميزانية ويُخصص لمواجهة:", options: ["أ) الرحلات الترفيهية والمكافآت السنوية للإدارة العليا", "ب) المخاطر المحددة سلفاً في سجل المخاطر والتي لها ملاك معروفون", "ج) المخاطر غير المتوقعة وغير المحددة تماماً (Unknown-Unknowns)", "د) الزيادات الضريبية الثابتة والمعلنة من الدولة مسبقاً"], correct: 2 },
            { q: "49. عمليات مراجعة المخاطر (Risk Audits) هي أداة هامة تستخدم أثناء مراقبة المخاطر بهدف:", options: ["أ) تقييم فاعلية عمليات إدارة المخاطر الشاملة والاستجابات المنفذة في المشروع", "ب) التحقيق مع الموظفين لمعرفة من المتسبب في تأخير الأنشطة الميدانية", "ج) التأكد من مطابقة المواد الموردة للمواصفات الهندسية للمالك", "د) حساب الأرباح والخسائر الربع سنوية للمؤسسة"], correct: 0 },
            { q: "50. عند التأكد من زوال خطر معين تماماً أو انتهاء مرحلته دون وقوعه، يجب على مدير المشروع فوراً:", options: ["أ) إلغاء خطة المشروع بالكامل وإعادة بنائها", "ب) تجاهل الموضوع والتركيز على المخاطر الجديدة فقط دون تعديل", "ج) تحديث سجل المخاطر بإغلاق الخطر (Close Risk) وتوثيق الدروس المستفادة", "د) توزيع احتياطي الطوارئ الخاص بالخطر كأرباح فورية للفريق"], correct: 2 }
        ];

        let currentQuestionIndex = 0;
        let score = 0;
        let userName = "";
        let selectedOptionIndex = null;

        function startQuiz() {
            userName = document.getElementById('trainee-name').value.trim();
            if(!userName) {
                alert("برجاء إدخال اسمك أولاً يا هندسة!");
                return;
            }
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('progress-area').style.display = 'block';
            document.getElementById('quiz-screen').style.display = 'block';
            showQuestion();
        }

        function showQuestion() {
            selectedOptionIndex = null;
            document.getElementById('next-btn').disabled = true;
            
            if(currentQuestionIndex === questions.length - 1) {
                document.getElementById('next-btn').innerText = "إنهاء الاختبار وعرض النتيجة";
            } else {
                document.getElementById('next-btn').innerText = "السؤال التالي";
            }

            const progressPercent = (currentQuestionIndex / questions.length) * 100;
            document.getElementById('progress-bar').style.width = progressPercent + '%';

            const currentQuestion = questions[currentQuestionIndex];
            document.getElementById('question-text').innerText = currentQuestion.q;
            
            const optionsList = document.getElementById('options-list');
            optionsList.innerHTML = "";
            currentQuestion.options.forEach((option, index) => {
                const btn = document.createElement('button');
                btn.className = "option-btn";
                btn.innerText = option;
                btn.onclick = () => selectOption(index, btn);
                optionsList.appendChild(btn);
            });
        }

        function selectOption(index, btn) {
            selectedOptionIndex = index;
            document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            document.getElementById('next-btn').disabled = false;
        }

        function nextQuestion() {
            if(selectedOptionIndex === questions[currentQuestionIndex].correct) {
                score++;
            }

            currentQuestionIndex++;
            if(currentQuestionIndex < questions.length) {
                showQuestion();
            } else {
                finishQuiz();
            }
        }

        function finishQuiz() {
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('progress-area').style.display = 'none';

            const percent = (score / questions.length) * 100;
            const status = percent >= 70 ? "ناجح" : "راسب";
            const scoreText = `${score} من ${questions.length} (${percent.toFixed(1)}%)`;

            displayFinalResult(status, scoreText);

            const finalSendUrl = `${SERVER_URL}?name=${encodeURIComponent(userName)}&score=${encodeURIComponent(scoreText)}&status=${encodeURIComponent(status)}`;

            fetch(finalSendUrl, { mode: 'no-cors' })
            .then(() => { console.log("تمت المزامنة بنجاح واحترافية مع شيت جوجل."); })
            .catch((err) => { console.error("تم تخطي خطأ بسيط في الإرسال الصامت:", err); });
        }

        function displayFinalResult(status, scoreText) {
            document.getElementById('result-screen').style.display = 'block';
            const resultContent = document.getElementById('result-content');
            
            if(status === "ناجح") {
                resultContent.innerHTML = `
                    <div class="success-box">
                        🎉 مبروك النجاح يا هندسة!<br>
                        تم تسجيل نتيجتك بنجاح فى قاعدة البيانات، وسيتم التواصل معك لتسليم الشهادة.
                    </div>
                    <p style="font-size: 17px; margin-top:15px;">درجتك النهائية هي: <strong style="color:#10b981;">${scoreText}</strong></p>
                `;
            } else {
                resultContent.innerHTML = `
                    <div class="fail-box">
                        للأسف لم تتخطى نسبة النجاح المطلوبة (70%) يا هندسة.
                    </div>
                    <p style="font-size: 17px;">درجتك الحالية هي: <strong style="color:#ef4444;">${scoreText}</strong></p>
                    <p style="color: #9ca3af; font-size:14px; padding:0 20px;">ننصحك بمراجعة محاضرات الكورس بتركيز وإعادة المحاولة في أي وقت؛ فالمهندس الناجح لا يستسلم!</p>
                    <button class="btn" style="margin-top:20px;" onclick="window.location.reload()">إعادة الاختبار الآن</button>
                `;
            }
        }
    </script>
